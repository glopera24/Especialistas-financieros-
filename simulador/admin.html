<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Multisimulador Financiero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-shadow {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        .tab-active {
            border-bottom: 3px solid #7c3aed;
            color: #7c3aed;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold"><i class="fas fa-cog mr-2"></i>Panel de Administración</h1>
                    <p class="text-sm opacity-90 mt-1">Gestión de bancos, productos y tasas</p>
                </div>
                <button onclick="window.location.href='index.html'" class="bg-white text-purple-600 px-4 py-2 rounded-lg font-semibold hover:bg-purple-50 transition">
                    <i class="fas fa-arrow-left mr-2"></i>Volver al Simulador
                </button>
            </div>
        </div>
    </header>

    <!-- Tabs Navigation -->
    <div class="bg-white border-b border-gray-200">
        <div class="container mx-auto px-4">
            <nav class="flex space-x-8">
                <button onclick="switchTab('bancos')" id="tab-bancos" class="py-4 px-2 font-semibold text-gray-600 hover:text-purple-600 transition tab-active">
                    <i class="fas fa-university mr-2"></i>Bancos
                </button>
                <button onclick="switchTab('productos')" id="tab-productos" class="py-4 px-2 font-semibold text-gray-600 hover:text-purple-600 transition">
                    <i class="fas fa-tags mr-2"></i>Productos
                </button>
                <button onclick="switchTab('tasas')" id="tab-tasas" class="py-4 px-2 font-semibold text-gray-600 hover:text-purple-600 transition">
                    <i class="fas fa-percentage mr-2"></i>Tasas
                </button>
            </nav>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Bancos Section -->
        <div id="section-bancos" class="tab-content">
            <div class="bg-white rounded-xl card-shadow p-8 mb-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">
                        <i class="fas fa-university text-purple-600 mr-2"></i>Gestión de Bancos
                    </h2>
                    <button onclick="showAddBancoModal()" class="bg-purple-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-purple-700 transition">
                        <i class="fas fa-plus mr-2"></i>Agregar Banco
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="px-4 py-3 text-left font-semibold text-gray-700">Orden</th>
                                <th class="px-4 py-3 text-left font-semibold text-gray-700">Nombre</th>
                                <th class="px-4 py-3 text-center font-semibold text-gray-700">Estado</th>
                                <th class="px-4 py-3 text-center font-semibold text-gray-700">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="bancosTableBody">
                            <!-- Bancos will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Productos Section -->
        <div id="section-productos" class="tab-content hidden">
            <div class="bg-white rounded-xl card-shadow p-8 mb-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">
                        <i class="fas fa-tags text-purple-600 mr-2"></i>Gestión de Productos
                    </h2>
                    <button onclick="showAddProductoModal()" class="bg-purple-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-purple-700 transition">
                        <i class="fas fa-plus mr-2"></i>Agregar Producto
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="px-4 py-3 text-left font-semibold text-gray-700">Código</th>
                                <th class="px-4 py-3 text-left font-semibold text-gray-700">Nombre</th>
                                <th class="px-4 py-3 text-left font-semibold text-gray-700">Descripción</th>
                                <th class="px-4 py-3 text-center font-semibold text-gray-700">Estado</th>
                                <th class="px-4 py-3 text-center font-semibold text-gray-700">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="productosTableBody">
                            <!-- Productos will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Tasas Section -->
        <div id="section-tasas" class="tab-content hidden">
            <div class="bg-white rounded-xl card-shadow p-8 mb-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">
                        <i class="fas fa-percentage text-purple-600 mr-2"></i>Gestión de Tasas
                    </h2>
                    <div class="space-x-2">
                        <button onclick="showAddTasaModal()" class="bg-purple-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-purple-700 transition">
                            <i class="fas fa-plus mr-2"></i>Agregar Tasa
                        </button>
                        <button onclick="showBulkUpdateModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
                            <i class="fas fa-upload mr-2"></i>Actualización Masiva
                        </button>
                    </div>
                </div>

                <!-- Filters -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <select id="filterProducto" onchange="filterTasas()" class="px-4 py-2 border border-gray-300 rounded-lg">
                        <option value="">Todos los productos</option>
                    </select>
                    <select id="filterBanco" onchange="filterTasas()" class="px-4 py-2 border border-gray-300 rounded-lg">
                        <option value="">Todos los bancos</option>
                    </select>
                    <select id="filterTipoVivienda" onchange="filterTasas()" class="px-4 py-2 border border-gray-300 rounded-lg">
                        <option value="">Todos los tipos</option>
                        <option value="VIS">VIS</option>
                        <option value="NO_VIS">NO VIS</option>
                    </select>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="px-3 py-2 text-left font-semibold text-gray-700">Banco</th>
                                <th class="px-3 py-2 text-left font-semibold text-gray-700">Producto</th>
                                <th class="px-3 py-2 text-center font-semibold text-gray-700">Tipo</th>
                                <th class="px-3 py-2 text-right font-semibold text-gray-700">Tasa Mín</th>
                                <th class="px-3 py-2 text-right font-semibold text-gray-700">Tasa Máx</th>
                                <th class="px-3 py-2 text-center font-semibold text-gray-700">Vigencia</th>
                                <th class="px-3 py-2 text-center font-semibold text-gray-700">Disponible</th>
                                <th class="px-3 py-2 text-center font-semibold text-gray-700">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tasasTableBody">
                            <!-- Tasas will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Container -->
    <div id="modalContainer" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div id="modalContent" class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <!-- Modal content will be inserted here -->
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
